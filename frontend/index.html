<!DOCTYPE html>
<html>
    <!-- This is the starting page for the Hack A Password Game -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack A Password Game</title>
    <style>
        body {
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0; 
        }

        input[type="submit"], button {
            border: none;
            cursor: pointer; 
        }

        input[type="text"] {
            border: 1px solid #15b812; 
        }
    </style>
</head>
<body style="background-color: black">
    <form>
        <div>
        <!-- Username Label and Input -->
        <label style = "color: #15b812"for="user">Username:</label>
        <input style = "background-color: black; color: #15b812" type="text" id="user" name="user">
        <br><br>
        </div>

        <div> 
        <!-- Password Label and Input -->
        <label style = "color: #15b812"for="password">Password:</label>
        <input style = "background-color: black; color: #15b812" type="text" id="password" name="password">
        <br><br>
        </div>

        <div>
        <!-- Submit Button (Needs proper frontend and backend to work (JS and Python))-->
        <input style="background-color: black; color: #15b812" type="submit" value="Analyze Password" onclick="event.preventDefault(); window.location.href='loadingScreen.html'">
        <a style="background-color: black; color: #15b812; margin-left: 10px; text-decoration: none" href="leaderboard.html">View Leaderboard</a>
    </div>

    </form>

    <script>
    document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();
    const username = document.getElementById("user").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/submit_password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const result = await response.json();

    if (response.ok) {
        // Store metrics temporarily to display in performance summary
        sessionStorage.setItem("metrics", JSON.stringify(result.metrics));
        // Redirect to loading screen
        window.location.href = "/loading";
    } else {
        alert(result.error);
    }
});
</script>
</body>
</html>
