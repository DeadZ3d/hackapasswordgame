<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack A Password Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: black;
            font-family: 'Share Tech Mono', monospace;
        }

        .container {
            border: 1px solid #15b812;
            padding: 40px 50px;
            box-shadow: 0 0 30px rgba(21, 184, 18, 0.3);
        }

        h1 {
            color: #15b812;
            text-align: center;
            margin: 0 0 30px 0;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        label {
            color: #15b812;
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="password"] {
            background-color: black;
            color: #15b812;
            border: 1px solid #15b812;
            padding: 8px 12px;
            width: 100%;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            outline: none;
            margin-bottom: 20px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            box-shadow: 0 0 8px rgba(21, 184, 18, 0.6);
        }

        .btn-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        button[type="submit"] {
            background-color: black;
            color: #15b812;
            border: 1px solid #15b812;
            padding: 10px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background-color 0.2s, color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #15b812;
            color: black;
        }

        a.link {
            color: #15b812;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        a.link:hover { text-decoration: underline; }

        #error-msg {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ Hack A Password ]</h1>
        <form id="main-form">
            <label for="user">Username:</label>
            <input type="text" id="user" name="user" autocomplete="off" required>

            <label for="password">Password:</label>
            <!-- Use type="text" so user can see what they type — this is intentional for the game -->
            <input type="text" id="password" name="password" autocomplete="off" required>

            <div class="btn-row">
                <button type="submit">Analyze Password</button>
                <a class="link" href="/leaderboard">View Leaderboard</a>
            </div>
            <p id="error-msg"></p>
        </form>
    </div>

    <script>
        document.getElementById("main-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("user").value.trim();
            const password = document.getElementById("password").value;
            const errorEl = document.getElementById("error-msg");
            errorEl.style.display = "none";

            if (!username || !password) {
                errorEl.textContent = "Both fields are required.";
                errorEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch("/submit_password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    sessionStorage.setItem("metrics", JSON.stringify(result.metrics));
                    window.location.href = "/loading";
                } else {
                    errorEl.textContent = result.error || "Something went wrong.";
                    errorEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = "Could not reach server. Is Flask running?";
                errorEl.style.display = "block";
            }
        });
    </script>
</body>
</html>
