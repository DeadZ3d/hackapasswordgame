<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Summary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; }

        body {
            background-color: black;
            color: #15b812;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        h2 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 12px rgba(21, 184, 18, 0.6);
        }

        #placement {
            font-size: 1rem;
            margin-bottom: 30px;
            color: #aaffaa;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            max-width: 500px;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        th {
            background-color: #0d4d0c;
            color: #15b812;
            padding: 12px 16px;
            text-align: left;
            letter-spacing: 1px;
            font-size: 0.85rem;
            border: 1px solid #15b812;
        }

        td {
            padding: 10px 16px;
            border: 1px solid #1a5c19;
            color: #15b812;
            font-size: 0.95rem;
        }

        tr:nth-child(even) td { background-color: #050d05; }
        tr:nth-child(odd) td  { background-color: #020902; }

        /* Strength badge */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 2px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .badge-weak   { background-color: #4d0000; color: #ff6666; border: 1px solid #ff4444; }
        .badge-medium { background-color: #4d3800; color: #ffcc44; border: 1px solid #ffaa00; }
        .badge-strong { background-color: #004d00; color: #44ff44; border: 1px solid #15b812; }

        /* Warnings section */
        #warnings {
            max-width: 500px;
            width: 100%;
            margin-bottom: 30px;
        }

        .warning-item {
            background-color: #1a0000;
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 8px 14px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .continue-btn {
            background-color: black;
            color: #15b812;
            border: 1px solid #15b812;
            padding: 12px 28px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        .continue-btn:hover {
            background-color: #15b812;
            color: black;
        }
    </style>
</head>
<body>
    <h2>[ Performance Summary ]</h2>
    <p id="placement">—</p>

    <table>
        <tr><th>Metric</th><th>Value</th></tr>
        <tr><td>Total Characters</td><td id="length">—</td></tr>
        <tr><td>Uppercase Letters</td><td id="uppercase">—</td></tr>
        <tr><td>Lowercase Letters</td><td id="lowercase">—</td></tr>
        <tr><td>Digits</td><td id="digits">—</td></tr>
        <tr><td>Symbols</td><td id="symbols">—</td></tr>
        <tr><td>Strength</td><td id="strength">—</td></tr>
    </table>

    <div id="warnings"></div>

    <button class="continue-btn" onclick="window.location.href='/leaderboard'">
        View Leaderboard →
    </button>

    <script>
        const raw = sessionStorage.getItem("metrics");

        if (!raw) {
            // No data — send back to start
            window.location.href = "/";
        } else {
            const metrics = JSON.parse(raw);

            document.getElementById("length").textContent    = metrics.length   ?? "—";
            document.getElementById("uppercase").textContent = metrics.uppercase ?? "—";
            document.getElementById("lowercase").textContent = metrics.lowercase ?? "—";
            document.getElementById("digits").textContent    = metrics.digits    ?? "—";
            document.getElementById("symbols").textContent   = metrics.symbols   ?? "—";

            // Strength badge
            const strengthEl = document.getElementById("strength");
            const s = (metrics.strength || "").toLowerCase();
            const badgeClass = s === "strong" ? "badge-strong"
                             : s === "medium" ? "badge-medium"
                             : "badge-weak";
            strengthEl.innerHTML = `<span class="badge ${badgeClass}">${metrics.strength || "—"}</span>`;

            // Placement
            const rank  = metrics.rank         ?? 1;
            const total = metrics.totalPlayers  ?? 1;
            document.getElementById("placement").textContent =
                `You placed #${rank} out of ${total} player${total !== 1 ? "s" : ""}`;

            // Warnings for leaked / dictionary matches
            const warningsEl = document.getElementById("warnings");
            if (metrics.leaked_matches && metrics.leaked_matches.length > 0) {
                const div = document.createElement("div");
                div.className = "warning-item";
                div.textContent = `⚠ Password contains known breached words: ${metrics.leaked_matches.join(", ")}`;
                warningsEl.appendChild(div);
            }
            if (metrics.english_matches && metrics.english_matches.length > 0) {
                const div = document.createElement("div");
                div.className = "warning-item";
                div.textContent = `⚠ Password contains common English words: ${metrics.english_matches.join(", ")}`;
                warningsEl.appendChild(div);
            }
        }
    </script>
</body>
</html>
